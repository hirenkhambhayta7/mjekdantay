{% extends 'base.html' %}
{% load static %}

{% block title %}Payment Failed — MJ Ekdantay Masala Centre{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="payment-result">
        <div class="result-icon failed">
            <i class="bi bi-x-lg"></i>
        </div>
        <h2 class="mb-3">Payment Failed</h2>
        <p class="text-muted mb-4">Something went wrong with your payment. Don't worry, no amount has been deducted.</p>

        <div class="d-flex gap-3 justify-content-center flex-wrap">
            <a href="{% url 'orders:checkout' %}" class="btn btn-primary-custom">
                <i class="bi bi-arrow-repeat me-2"></i>Try Again
            </a>
            <a href="{% url 'orders:cart' %}" class="btn btn-outline-custom">
                <i class="bi bi-bag me-2"></i>Back to Cart
            </a>
        </div>
    </div>
</div>
{% endblock %}
